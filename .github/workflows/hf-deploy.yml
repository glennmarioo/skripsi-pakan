name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Copy Dockerfile.backend to Dockerfile so HF Spaces detects it automatically
          cp Dockerfile.backend Dockerfile
          git config --global user.email "bot@ciptasamaabadi.com"
          git config --global user.name "Deploy Bot"
          
          # Hapus folder PENULISAN dari workspace jika masih ada
          rm -rf PENULISAN || true
          
          # Buat cabang baru tanpa riwayat masa lalu (orphan)
          git checkout --orphan hf-deploy-branch
          git add -A
          git commit -m "Deploy to HF Spaces" || echo "No changes to commit"
          
          # Push paksa cabang baru ini ke main di Hugging Face
          git push --force https://glennmarioo:$HF_TOKEN@huggingface.co/spaces/glennmarioo/backend-pakan hf-deploy-branch:main
